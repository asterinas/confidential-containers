name: Test | Published Asterinas CoCo Image

on:
  pull_request:
    paths:
      - .github/workflows/test-published-asterinas-coco-image.yml
  push:
    branches:
      - main
    paths:
      - .github/workflows/test-published-asterinas-coco-image.yml
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:
    inputs:
      image:
        description: Optional image reference to test
        required: false
        default: ""
        type: string
  workflow_call:
    inputs:
      image:
        description: Optional explicit image reference to test
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  test-image:
    name: Test published Asterinas CoCo image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Image
        id: resolve
        env:
          WORKFLOW_IMAGE: ${{ inputs.image }}
        shell: bash
        run: |
          set -euo pipefail

          source ./tools/scripts/asterinas-coco-defaults.sh
          if [ -n "${WORKFLOW_IMAGE}" ]; then
            image="${WORKFLOW_IMAGE}"
          else
            image="${IMAGE_REPOSITORY}:${DEFAULT_ASTERINAS_BASE_IMAGE##*:}"
          fi

          test -n "${image}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "Testing image: \`${image}\`" >> "${GITHUB_STEP_SUMMARY}"

      - name: Pull Image
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${{ steps.resolve.outputs.image }}"

      - name: Fetch Latest Asterinas Source
        shell: bash
        run: |
          set -euo pipefail

          ASTERINAS_SRC="${RUNNER_TEMP}/asterinas"
          rm -rf "${ASTERINAS_SRC}"
          git clone --depth 1 https://github.com/asterinas/asterinas "${ASTERINAS_SRC}"
          echo "ASTERINAS_SRC=${ASTERINAS_SRC}" >> "${GITHUB_ENV}"

      - name: Start CoCo Dev Container
        shell: bash
        run: |
          set -euo pipefail

          docker rm -f coco-dev >/dev/null 2>&1 || true
          docker run -d \
            --rm \
            --name coco-dev \
            --privileged \
            --cgroupns host \
            --device /dev/kvm \
            --device /dev/vhost-net \
            --device /dev/vhost-vsock \
            --tmpfs /var/lib/containerd-nydus:rw,size=512m \
            -v "${ASTERINAS_SRC}:/root/asterinas" \
            "${{ steps.resolve.outputs.image }}" \
            sleep infinity

      - name: Enable Runner Swap
        shell: bash
        run: |
          set -euo pipefail

          if swapon --show=NAME --noheadings | grep -q .; then
            swapon --show
            free -h
            exit 0
          fi

          sudo fallocate -l 8G /mnt/coco-ci.swap
          sudo chmod 600 /mnt/coco-ci.swap
          sudo mkswap /mnt/coco-ci.swap
          sudo swapon /mnt/coco-ci.swap
          swapon --show
          free -h

      - name: Build Latest Asterinas Guest Kernel
        shell: bash
        run: |
          set -euo pipefail

          docker exec coco-dev bash -lc '
            set -euo pipefail

            cd /root/asterinas
            make kernel BOOT_METHOD=qemu-direct

            kernel_path="/root/asterinas/target/osdk/aster-kernel-osdk-bin.qemu_elf"
            test -f "${kernel_path}"

            config="/opt/coco/config/configuration-qemu-coco-dev-asterinas.toml"
            grep -q "^kernel = " "${config}"
            sed -i "s|^kernel = .*|kernel = \"${kernel_path}\"|" "${config}"
          '

      - name: Install CoCo Cluster
        shell: bash
        run: |
          set -euo pipefail

          if ! docker exec coco-dev /opt/coco/setup-coco-k8s.sh; then
            docker inspect coco-dev --format 'OOMKilled={{.State.OOMKilled}} ExitCode={{.State.ExitCode}} Error={{.State.Error}}' || true
            docker exec coco-dev sh -lc 'free -h; ps aux --sort=-rss | head -40' || true
            dmesg | tail -100 || true
            exit 1
          fi

      - name: Run CoCo Demo
        shell: bash
        run: |
          set -euo pipefail

          docker exec coco-dev kubectl apply -f /opt/coco/manifests/alpine-kata-qemu-coco-dev.yaml
          docker exec coco-dev kubectl wait \
            --for=condition=Ready \
            pod/alpine-kata-qemu-coco-dev \
            --timeout=5m

      - name: Verify Alpine Guest
        shell: bash
        run: |
          set -euo pipefail

          kernel_path="/root/asterinas/target/osdk/aster-kernel-osdk-bin.qemu_elf"
          guest_cmdline="$(
            docker exec coco-dev kubectl exec alpine-kata-qemu-coco-dev -- cat /proc/cmdline
          )"
          echo "Guest cmdline: ${guest_cmdline}"
          printf '%s\n' "${guest_cmdline}" | grep -Fq "${kernel_path}"

          alpine_release_raw="$(
            docker exec coco-dev kubectl exec alpine-kata-qemu-coco-dev -- cat /etc/alpine-release
          )"
          alpine_release="$(
            printf '%s\n' "${alpine_release_raw}" | grep -Eo '[0-9]+(\.[0-9]+)+' | tail -n 1
          )"
          test -n "${alpine_release}"

          echo "Parsed Alpine release: ${alpine_release}"
          echo "Alpine release: \`${alpine_release}\`" >> "${GITHUB_STEP_SUMMARY}"

      - name: Delete Demo Pod
        if: always()
        shell: bash
        run: |
          docker exec coco-dev kubectl delete pod alpine-kata-qemu-coco-dev --ignore-not-found=true --wait=true --timeout=2m || true

      - name: Collect Failure Logs
        if: ${{ failure() || cancelled() }}
        shell: bash
        run: |
          docker exec coco-dev sh -lc 'echo "===== console.log ====="; tail -n 240 /tmp/console.log 2>/dev/null || true'
          docker exec coco-dev sh -lc 'echo "===== qemu-serial.log ====="; tail -n 240 /tmp/qemu-serial.log 2>/dev/null || true'
          docker exec coco-dev sh -lc 'echo "===== containerd.log ====="; tail -n 240 /tmp/containerd.log 2>/dev/null || true'

      - name: Stop CoCo Dev Container
        if: always()
        shell: bash
        run: |
          docker rm -f coco-dev >/dev/null 2>&1 || true

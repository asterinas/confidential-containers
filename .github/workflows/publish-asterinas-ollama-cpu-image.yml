name: Publish | Asterinas Ollama with Qwen Image

on:
  workflow_dispatch:
    inputs:
      image:
        description: Image reference to build and publish
        required: true
        default: asterinas/ollama-with-qwen2.5:latest
        type: string
      ollama_image:
        description: Base Ollama image to copy the CPU runtime from
        required: true
        default: ollama/ollama:latest
        type: string

permissions:
  contents: read

jobs:
  publish-image:
    name: Build and push Asterinas Ollama with Qwen image
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Resolve Build Inputs
        id: resolve
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          WORKFLOW_IMAGE: ${{ inputs.image }}
          WORKFLOW_OLLAMA_IMAGE: ${{ inputs.ollama_image }}
        shell: bash
        run: |
          set -euo pipefail

          image="${WORKFLOW_IMAGE:-asterinas/ollama-with-qwen2.5:latest}"
          ollama_image="${WORKFLOW_OLLAMA_IMAGE:-ollama/ollama:latest}"

          test -n "${image}"
          test -n "${ollama_image}"
          test -n "${DOCKERHUB_USERNAME}"
          test -n "${DOCKERHUB_TOKEN}"

          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "ollama_image=${ollama_image}" >> "${GITHUB_OUTPUT}"

          {
            echo '## Resolved Build Inputs'
            echo
            echo "- Image: \`${image}\`"
            echo "- Ollama base image: \`${ollama_image}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Build Image
        shell: bash
        run: |
          set -euo pipefail

          build_context="${RUNNER_TEMP}/ollama-with-qwen-build-context"
          rm -rf "${build_context}"
          install -d "${build_context}"
          cp tools/docker/ollama-cpu/Dockerfile.qwen2.5-0.5b "${build_context}/Dockerfile"

          DOCKER_BUILDKIT=1 docker build \
            --file "${build_context}/Dockerfile" \
            --tag "${{ steps.resolve.outputs.image }}" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.description=Asterinas Ollama image with qwen2.5:0.5b preloaded" \
            --label "org.opencontainers.image.version=ollama-with-qwen2.5" \
            --label "org.opencontainers.image.base.name=${{ steps.resolve.outputs.ollama_image }}" \
            --build-arg "OLLAMA_IMAGE=${{ steps.resolve.outputs.ollama_image }}" \
            "${build_context}"

      - name: Verify Preloaded Model
        shell: bash
        run: |
          set -euo pipefail

          container_name="ollama-with-qwen-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          docker rm -f "${container_name}" >/dev/null 2>&1 || true
          docker run -d \
            --rm \
            --name "${container_name}" \
            "${{ steps.resolve.outputs.image }}"

          for _ in $(seq 1 60); do
            if docker exec "${container_name}" ollama list >/tmp/ollama-list.txt 2>/tmp/ollama-list.err; then
              break
            fi
            sleep 1
          done

          cat /tmp/ollama-list.txt
          grep -Fq 'qwen2.5:0.5b' /tmp/ollama-list.txt

          docker rm -f "${container_name}" >/dev/null

      - name: Log In to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.resolve.outputs.image }}"

      - name: Write Workflow Summary
        shell: bash
        run: |
          {
            echo '## Asterinas Ollama with Qwen image result'
            echo
            echo "- Image: \`${{ steps.resolve.outputs.image }}\`"
            echo "- Ollama base image: \`${{ steps.resolve.outputs.ollama_image }}\`"
            echo "- Preloaded model: \`qwen2.5:0.5b\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Stop Test Container
        if: always()
        shell: bash
        run: |
          docker rm -f "ollama-with-qwen-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >/dev/null 2>&1 || true
